apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-deployment
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-container
        image: ipadm1337/my-web-app:latest  # <--- Меняем здесь
        imagePullPolicy: Always                         # <--- Меняем на Always, чтобы K8s проверял новые версии
        ports:
        - containerPort: 80
