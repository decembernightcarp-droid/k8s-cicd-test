# Количество копий приложения
replicaCount: 3

# Настройки Docker-образа
image:
  repository: ipadm1337/my-web-app
  tag: "latest"
  pullPolicy: Always

# Настройки сети
service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: "nginx"
  host: my-gitops-app.local
